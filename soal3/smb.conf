[global]
   workgroup = WORKGROUP
   server string = LibraryIT Server
   security = user
   passdb backend = tdbsam
   map to guest = never

   server min protocol = SMB2
   server max protocol = SMB3

   load printers = no
   disable spoolss = yes
   printing = bsd
   printcap name = /dev/null

[ebooks]
   path = /libraryit/ebooks
   browseable = yes
   read only = no
   valid users = member contributor librarian
   read list = member
   write list = contributor librarian
   force user = root
   force group = staff
   create mask = 0664
   directory mask = 2775

[papers]
   path = /libraryit/papers
   browseable = yes
   read only = no
   valid users = member contributor librarian
   read list = member
   write list = contributor librarian
   force user = root
   force group = staff
   create mask = 0664
   directory mask = 2775

[SourceCode]
   path = /libraryit/sourcecode
   browseable = yes
   writable = yes
   read only = no
   valid users = contributor librarian
   write list = contributor librarian
   force user = root
   force group = staff
   create mask = 0664
   directory mask = 2775

[docs]
   path = /libraryit/docs
   browseable = yes
   writable = yes
   read only = no
   valid users = member contributor librarian
   read list = member contributor
   write list = librarian
   force user = root
   force group = staff
   create mask = 0644
   directory mask = 0755